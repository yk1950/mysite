<body>
    <h1>HTML自習　ｺﾝｿｰﾙとﾌﾞﾗｳｻﾞ表示の練習 JS基礎自習用</h1>
    <br>

    <button>PUSH</button>　←四角のボタンエリア＜button>＜/button＞
    <h2></h2>
    <br><!-- 改行 -->
    
    <textarea>ｸﾘｯｸするとあなたの名前が表示されます</textarea>
    ←テキストエリア
    <br><br>

    <div>
        <p>好きな色を一つだけ選んでOKﾎﾞﾀﾝ押してください</p>
        <input type="radio" name="color" value="red">アカ
        <input type="radio" name="color" value="Green">ミドリ
        <input type="radio" name="color" value="blue">アオ
    </div><div>  
       <br>
        <button id="button2">OK</button>
    </div>
        <!-- ﾗｼﾞｵﾎﾞﾀﾝをｸﾘｯｸすると他のボタンは色消える 1個だけ選択される＝HTMLだけの記述で -->

        <br><br>
       

        <!-- 最上段はｲﾝﾌﾟｯﾄｴﾘｱ全般、上段はｲﾝﾌﾟｯﾄ枠内、下段はﾎﾞﾀﾝの設定。ipentecのパクリ１２／４-->
 
<!-- ﾎﾞﾀﾝｸﾘｯｸしたら初期文字列に「数値」が上書きされます。formの外側で記述しないと表示されない　数値の後ろに個をつけたい -->  
      <!-- textｴﾘｱの列40行５のﾃﾞﾌｫﾙﾄ値 -->

            <label>コメント：<br><textarea cols="40" rows="4" id="reviewTextarea"></textarea>
        
        <P>ｺﾒﾝﾄｺﾋﾟｰと文字数</P>
        <p id="msg"></p><p id="count"></p>
    </label>
        <script>
            'use.strict'; {
                let open = alert('自習画面開きますか？');
                let name = prompt('あなたの名前を入力ください');/* nameを変数で入力 */
                document.querySelector('textarea').addEventListener('click', () => {/* ﾃｷｽﾄｴﾘｱをｸﾘｯｸすると */
                    document.querySelector('textarea').textContent = name;  /* good! by myself  nameを代入すると当初Pﾀｸﾞ記述の「あなたの...ください」に上書きされるからValue＝’’は不要である。*/
            console.log(name)  ;/* ''で囲まない。入力値で表示させるため＝重要 */
                // document.querySelector('textarea').addEventListener('click',()=>
                // {document.querySelector('textarea').value=' ' */
            })
                document.querySelector('button').addEventListener('click', () => {
                    console.log('clicked');
                    document.querySelector('button').textContent = '押済み'
                    document.querySelector('h2').textContent = 'ごきげんよう(ｸﾘｯｸ後のJS内で指定したh2文字）';
console.log('h2');
                })
                /* alert正常に表示→ｶｯｺ波ｶｯｺが理解できない1/14　14:50*/
                 document.querySelector('#button2').addEventListener('click',()=>{
                    console.log('clicked');

                  document.querySelectorAll('input').forEach((radio)=>{          
                    /* ！！重要なのは3個のﾎﾞﾀﾝをまとめる値がないのでname属性colorを使ってひとまとまりにするのでselectprallを使う事。ﾀｲﾌﾟﾐｽ誤all、正＝All */
                   if( radio.checked===true){
                      alert(radio.value);
                      console.log(radio);/* 後日削除します */
                  };
                });
            
  /* ﾗｼﾞｵﾎﾞﾀﾝ用に設定したOKボタンをクリックして初めて以下枠外表示が可能となるOKぼたんとりんくしてしまう。修正したい！！！ */              
                function inputChange(event) {
                    msg.innerText = reviewTextarea.value;
                    count.innerText =reviewTextarea.value.length;
                }
                let reviewTextarea = document.getElementById('reviewTextarea');
                reviewTextarea.addEventListener('change', inputChange);
                let msg = document.getElementById('msg');
                let count=document.getElementById('count');
            }
                  )};/* 1/14 1442に左記ｶｯｺ、波ｶｯｺを記述 */
        </script>
</body>
